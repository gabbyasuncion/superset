<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
</head>
<body style="margin: 0; padding: 0; background-color: #f0f4ff; font-family: 'Segoe UI', Arial, sans-serif; color: #333;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 36px 40px; text-align: center;">
              <div style="font-size: 48px; margin-bottom: 8px;">🐛</div>
              <h1 style="margin: 0; color: #ffffff; font-size: 26px; font-weight: 700; letter-spacing: -0.5px;">Devin AI Bug Swatter</h1>
              <p style="margin: 8px 0 0; color: rgba(255,255,255,0.8); font-size: 14px;">Monthly PR Report</p>
            </td>
          </tr>

          <!-- Stats grid -->
          <tr>
            <td style="padding: 32px 40px 16px;">
              <p style="margin: 0 0 20px; font-size: 15px; color: #666;">Here's what happened in the last 30 days 👇</p>
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="48%" style="background: #f0f4ff; border-radius: 12px; padding: 20px; text-align: center;">
                    <div style="font-size: 32px;">📖</div>
                    <div style="font-size: 28px; font-weight: 700; color: #667eea; margin: 6px 0;">{{ created_prs }}</div>
                    <div style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">PRs Authored</div>
                  </td>
                  <td width="4%"></td>
                  <td width="48%" style="background: #f0fff4; border-radius: 12px; padding: 20px; text-align: center;">
                    <div style="font-size: 32px;">🟢</div>
                    <div style="font-size: 28px; font-weight: 700; color: #38a169; margin: 6px 0;">{{ open_prs }}</div>
                    <div style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">Currently Open</div>
                  </td>
                </tr>
                <tr><td colspan="3" style="height: 16px;"></td></tr>
                <tr>
                  <td width="48%" style="background: #fff0f6; border-radius: 12px; padding: 20px; text-align: center;">
                    <div style="font-size: 32px;">✅</div>
                    <div style="font-size: 28px; font-weight: 700; color: #d53f8c; margin: 6px 0;">{{ merge_rate | round(1) }}%</div>
                    <div style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">Merge Rate</div>
                  </td>
                  <td width="4%"></td>
                  <td width="48%" style="background: #fffaf0; border-radius: 12px; padding: 20px; text-align: center;">
                    <div style="font-size: 32px;">🚫</div>
                    <div style="font-size: 28px; font-weight: 700; color: #dd6b20; margin: 6px 0;">{{ close_rate | round(1) }}%</div>
                    <div style="font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">Close Rate</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 24px 40px 36px; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #aaa;">
                Generated by Superset Automations 🤖 &mdash; powered by Devin AI
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
